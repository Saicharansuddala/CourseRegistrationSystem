spring.application.name=CourseRegistrationSystem

server.port=${PORT:5000}
server.address=0.0.0.0

spring.datasource.url=jdbc:mysql://${MYSQLHOST:mysql.railway.internal}:${MYSQLPORT:3306}/${MYSQLDATABASE:railway}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:cmWvaVQJSABtdpbgwFZqmJKwRyTKHEkt}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.initialization-fail-timeout=60000
spring.datasource.hikari.maximum-pool-size=5

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

spring.web.resources.cache.cachecontrol.no-cache=true

# Spring Actuator - expose health endpoint for Railway healthcheck
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Allow the app to start even if DB connection fails initially
spring.jpa.defer-datasource-initialization=true

allowed.origin=${ALLOWED_ORIGIN:http://localhost:5173}
